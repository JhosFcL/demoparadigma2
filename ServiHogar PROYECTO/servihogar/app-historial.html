<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial | ServiHogar</title>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app-shell">

    <aside class="sidebar">
        <a href="app-inicio.html" class="sidebar-logo">
            <img src="assets/images/logo.jpg" alt="ServiHogar">
            <span>Servi<b>Hogar</b></span>
        </a>
        <nav class="sidebar-nav">
            <a href="app-inicio.html" class="nav-item"><span class="icon">🏠</span><span>Inicio</span></a>
            <a href="app-buscar.html" class="nav-item"><span class="icon">🔍</span><span>Buscar</span></a>
            <a href="app-chat.html" class="nav-item"><span class="icon">💬</span><span>Chats</span></a>
            <a href="app-historial.html" class="nav-item active"><span class="icon">📋</span><span>Historial</span></a>
            <a href="app-perfil.html" class="nav-item"><span class="icon">👤</span><span>Perfil</span></a>
        </nav>
        <div class="sidebar-user">
            <div class="user-name" id="sidebar-name">Cargando...</div>
            <div class="user-type" id="sidebar-type">Cliente</div>
            <a href="#" class="btn-salir" id="btn-salir">← Cerrar sesión</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title">Historial de servicios</div>
            <div class="topbar-actions">
                <div class="topbar-notif">🔔<span class="badge-notif">2</span></div>
                <div class="topbar-avatar" id="topbar-avatar">?</div>
            </div>
        </div>

        <div class="page">
            <div style="display:flex;gap:8px;margin-bottom:20px;">
                <button class="tab active" onclick="mostrarTab('todos',this)">Todos</button>
                <button class="tab" onclick="mostrarTab('completado',this)">Completados</button>
                <button class="tab" onclick="mostrarTab('pendiente',this)">Pendientes</button>
            </div>

            <div id="lista-historial" style="display:flex;flex-direction:column;gap:12px;"></div>
        </div>
    </div>
</div>

<style>
.tab{padding:8px 18px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;transition:all .2s;}
.tab.active,.tab:hover{background:#fbbf26;border-color:#fbbf26;font-weight:600;}
.historial-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center;gap:16px;}
.badge-estado{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-completado{background:#dcfce7;color:#16a34a;}
.badge-pendiente{background:#fef9c3;color:#ca8a04;}
</style>

<script>
const historial = [
    { servicio:"Reparación de tubería", trabajador:"Carlos Quispe", emoji:"🔧", fecha:"12 may 2025", monto:"S/ 80", estado:"completado" },
    { servicio:"Limpieza del hogar", trabajador:"Ana Torres", emoji:"🧹", fecha:"05 may 2025", monto:"S/ 120", estado:"completado" },
    { servicio:"Instalación eléctrica", trabajador:"Pedro Mamani", emoji:"⚡", fecha:"28 abr 2025", monto:"S/ 150", estado:"completado" },
    { servicio:"Mudanza de oficina", trabajador:"Juan Huanca", emoji:"📦", fecha:"30 may 2025", monto:"S/ 200", estado:"pendiente" },
];

function mostrarTab(filtro, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    const lista = filtro === "todos" ? historial : historial.filter(h => h.estado === filtro);
    renderHistorial(lista);
}

function renderHistorial(lista) {
    document.getElementById("lista-historial").innerHTML = lista.length ? lista.map(h => `
        <div class="historial-card">
            <div style="display:flex;align-items:center;gap:14px;">
                <div style="font-size:1.8rem;">${h.emoji}</div>
                <div>
                    <div style="font-weight:600;font-size:15px;">${h.servicio}</div>
                    <div style="font-size:13px;color:#6b7280;">${h.trabajador} · ${h.fecha}</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <span style="font-weight:600;">${h.monto}</span>
                <span class="badge-estado badge-${h.estado}">${h.estado.charAt(0).toUpperCase()+h.estado.slice(1)}</span>
                ${h.estado==='completado'?`<button class="btn-reservar" style="background:#fbbf26;border:none;padding:7px 14px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;">Repetir</button>`:''}
            </div>
        </div>
    `).join("") : `<div style="text-align:center;color:#9ca3af;padding:40px;">Sin servicios en esta categoría.</div>`;
}

renderHistorial(historial);
</script>

<script src="assets/js/app-interno.js"></script>
</body>
</html>
