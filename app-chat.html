<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | ServiHogar</title>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app-shell">

    <aside class="sidebar">
        <a href="app-inicio.html" class="sidebar-logo">
            <img src="assets/images/logo.jpg" alt="ServiHogar">
            <span>Servi<b>Hogar</b></span>
        </a>
        <nav class="sidebar-nav">
            <a href="app-inicio.html" class="nav-item"><span class="icon">🏠</span><span>Inicio</span></a>
            <a href="app-buscar.html" class="nav-item"><span class="icon">🔍</span><span>Buscar</span></a>
            <a href="app-chat.html" class="nav-item active"><span class="icon">💬</span><span>Chats</span></a>
            <a href="app-historial.html" class="nav-item"><span class="icon">📋</span><span>Historial</span></a>
            <a href="app-perfil.html" class="nav-item"><span class="icon">👤</span><span>Perfil</span></a>
        </nav>
        <div class="sidebar-user">
            <div class="user-name" id="sidebar-name">Cargando...</div>
            <div class="user-type" id="sidebar-type">Cliente</div>
            <a href="#" class="btn-salir" id="btn-salir">← Cerrar sesión</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title">Chats</div>
            <div class="topbar-actions">
                <div class="topbar-notif">🔔<span class="badge-notif">2</span></div>
                <div class="topbar-avatar" id="topbar-avatar">?</div>
            </div>
        </div>

        <div class="page chat-page">

            <!-- Lista de chats -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-title">Conversaciones</div>
                <div id="chat-list"></div>
            </div>

            <!-- Ventana de chat -->
            <div class="chat-window">
                <div class="chat-window-header" id="chat-header">Selecciona una conversación</div>
                <div id="chat-messages" class="chat-messages"></div>
                <form id="chat-form" class="chat-form">
                    <input id="chat-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" class="chat-input">
                    <button type="submit" class="chat-send-btn">Enviar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/app-interno.js"></script>
</body>
</html>
