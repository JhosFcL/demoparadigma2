<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | ServiHogar</title>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app-shell">

    <aside class="sidebar">
        <a href="app-inicio.html" class="sidebar-logo">
            <img src="assets/images/logo.jpg" alt="ServiHogar">
            <span>Servi<b>Hogar</b></span>
        </a>
        <nav class="sidebar-nav">
            <a href="app-inicio.html" class="nav-item"><span class="icon">🏠</span><span>Inicio</span></a>
            <a href="app-buscar.html" class="nav-item"><span class="icon">🔍</span><span>Buscar</span></a>
            <a href="app-chat.html" class="nav-item active"><span class="icon">💬</span><span>Chats</span></a>
            <a href="app-historial.html" class="nav-item"><span class="icon">📋</span><span>Historial</span></a>
            <a href="app-perfil.html" class="nav-item"><span class="icon">👤</span><span>Perfil</span></a>
        </nav>
        <div class="sidebar-user">
            <div class="user-name" id="sidebar-name">Cargando...</div>
            <div class="user-type" id="sidebar-type">Cliente</div>
            <a href="#" class="btn-salir" id="btn-salir">← Cerrar sesión</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title">Chats</div>
            <div class="topbar-actions">
                <div class="topbar-notif">🔔<span class="badge-notif">2</span></div>
                <div class="topbar-avatar" id="topbar-avatar">?</div>
            </div>
        </div>

        <div class="page" style="display:flex;gap:16px;height:calc(100vh - 80px);">

            <!-- Lista de chats -->
            <div style="width:280px;flex-shrink:0;background:#fff;border-radius:12px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
                <div style="padding:16px;font-weight:600;border-bottom:1px solid #f3f4f6;">Conversaciones</div>
                <div id="chat-list"></div>
            </div>

            <!-- Ventana de chat -->
            <div style="flex:1;background:#fff;border-radius:12px;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
                <div style="padding:16px;border-bottom:1px solid #f3f4f6;font-weight:600;" id="chat-header">Selecciona una conversación</div>
                <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;"></div>
                <form id="chat-form" style="padding:16px;border-top:1px solid #f3f4f6;display:flex;gap:8px;">
                    <input id="chat-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off"
                        style="flex:1;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;">
                    <button type="submit" style="background:#fbbf26;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;">Enviar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.chat-item{padding:14px 16px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .2s;}
.chat-item:hover,.chat-item.active{background:#fffbeb;}
.chat-item-name{font-weight:600;font-size:14px;}
.chat-item-last{font-size:12px;color:#9ca3af;margin-top:2px;}
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.sent{flex-direction:row-reverse;}
.msg-bubble{background:#f3f4f6;padding:10px 14px;border-radius:12px;font-size:14px;max-width:320px;}
.msg.sent .msg-bubble{background:#fbbf26;}
.msg-time{font-size:11px;color:#9ca3af;margin-top:4px;text-align:right;}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
</style>

<script>
const conversaciones = [
    { id:1, nombre:"Carlos Quispe", emoji:"🔧", mensajes:[
        {tipo:"recv",texto:"Hola, ¿en qué te puedo ayudar?"},
        {tipo:"sent",texto:"Necesito arreglar una tubería"},
        {tipo:"recv",texto:"Claro, ¿cuándo te viene bien?"}
    ]},
    { id:2, nombre:"Ana Torres", emoji:"🧹", mensajes:[
        {tipo:"recv",texto:"Buenos días, soy Ana para el servicio de limpieza"},
        {tipo:"sent",texto:"Perfecto, necesito el servicio el sábado"}
    ]},
    { id:3, nombre:"Pedro Mamani", emoji:"⚡", mensajes:[
        {tipo:"recv",texto:"¿En qué puedo ayudarte con la instalación eléctrica?"}
    ]},
];

let chatActual = null;

function renderChatList() {
    document.getElementById("chat-list").innerHTML = conversaciones.map(c => `
        <div class="chat-item" onclick="abrirChat(${c.id})">
            <div class="chat-item-name">${c.emoji} ${c.nombre}</div>
            <div class="chat-item-last">${c.mensajes[c.mensajes.length-1].texto.substring(0,35)}...</div>
        </div>
    `).join("");
}

function abrirChat(id) {
    chatActual = conversaciones.find(c => c.id === id);
    document.getElementById("chat-header").textContent = chatActual.emoji + " " + chatActual.nombre;
    const msgs = document.getElementById("chat-messages");
    msgs.innerHTML = chatActual.mensajes.map(m => `
        <div class="msg ${m.tipo === 'sent' ? 'sent' : ''}">
            ${m.tipo === 'recv' ? `<div class="msg-avatar">${chatActual.emoji}</div>` : ''}
            <div><div class="msg-bubble">${m.texto}</div></div>
        </div>
    `).join("");
    msgs.scrollTop = msgs.scrollHeight;
    document.querySelectorAll(".chat-item").forEach((el,i) => el.classList.toggle("active", conversaciones[i].id === id));
}

document.getElementById("chat-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const input = document.getElementById("chat-input");
    const texto = input.value.trim();
    if (!texto || !chatActual) return;
    chatActual.mensajes.push({tipo:"sent",texto});
    const msgs = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = "msg sent";
    div.innerHTML = `<div><div class="msg-bubble">${texto}</div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    input.value = "";
    setTimeout(() => {
        const resp = document.createElement("div");
        resp.className = "msg";
        resp.innerHTML = `<div class="msg-avatar">${chatActual.emoji}</div><div><div class="msg-bubble">Entendido, te confirmo en un momento. 👍</div></div>`;
        msgs.appendChild(resp);
        msgs.scrollTop = msgs.scrollHeight;
    }, 1200);
});

renderChatList();
</script>

<script src="assets/js/app-interno.js"></script>
</body>
</html>
